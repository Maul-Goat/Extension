<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>TikTok 60FPS Pro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    min-height: 420px;
    background: #0d0d0f;
    color: #e8e6f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 18px 12px;
    border-bottom: 1px solid #1e1e24;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25F4EE;
    box-shadow: 0 0 6px #25F4EE88;
    flex-shrink: 0;
  }
  .logo-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #25F4EE;
    text-transform: uppercase;
    flex: 1;
  }
  .version-badge {
    font-size: 10px;
    color: #555;
    background: #1a1a20;
    border: 1px solid #2a2a32;
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.5px;
  }

  /* ===== PAGES ===== */
  .page { display: none; flex-direction: column; }
  .page.active { display: flex; }

  /* ===== LOGIN PAGE ===== */
  .auth-wrap {
    padding: 24px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .auth-title {
    font-size: 16px;
    font-weight: 600;
    color: #f0eeff;
    text-align: center;
  }
  .auth-sub {
    font-size: 12px;
    color: #55546a;
    text-align: center;
    margin-top: -10px;
  }

  .tabs {
    display: flex;
    gap: 0;
    background: #15151a;
    border-radius: 8px;
    padding: 3px;
    border: 1px solid #1e1e26;
  }
  .tab-btn {
    flex: 1;
    padding: 7px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: #55546a;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .tab-btn.active {
    background: #1e1e2e;
    color: #c8c5f0;
    box-shadow: inset 0 0 0 1px #2e2e40;
  }

  .field-group { display: flex; flex-direction: column; gap: 10px; }

  .field-label {
    font-size: 11px;
    color: #55546a;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: #15151a;
    border: 1px solid #1e1e26;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: #e0deee;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .field-input::placeholder { color: #33323e; }
  .field-input:focus { border-color: #4a4a7a; }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #25F4EE18, #5651C818);
    border: 1px solid #3535555;
    border-color: #353555;
    border-radius: 8px;
    color: #c8c5f0;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { background: linear-gradient(135deg, #25F4EE25, #5651C825); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-error {
    font-size: 12px;
    color: #e05a5a;
    background: #e05a5a15;
    border: 1px solid #e05a5a30;
    border-radius: 6px;
    padding: 8px 10px;
    text-align: center;
    display: none;
  }
  .auth-error.show { display: block; }

  /* ===== MAIN PAGE ===== */
  .main-wrap { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  .user-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #15151a;
    border: 1px solid #1e1e26;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #25F4EE33, #5651C833);
    border: 1px solid #25F4EE44;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: #25F4EE;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name {
    font-size: 13px; font-weight: 600;
    color: #e0deee;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .user-email {
    font-size: 11px; color: #44435a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .plan-badge {
    font-size: 10px;
    background: #25F4EE18;
    color: #25F4EE;
    border: 1px solid #25F4EE33;
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .plan-badge.pro {
    background: #a78bfa18;
    color: #a78bfa;
    border-color: #a78bfa33;
  }

  /* Toggle */
  .toggle-card {
    background: #15151a;
    border: 1px solid #1e1e26;
    border-radius: 10px;
    padding: 14px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toggle-info { flex: 1; }
  .toggle-label-main {
    font-size: 13px; font-weight: 600; color: #e0deee;
  }
  .toggle-label-sub {
    font-size: 11px; color: #44435a; margin-top: 2px;
  }

  .switch {
    position: relative;
    width: 44px; height: 24px;
    flex-shrink: 0;
  }
  .switch input { display: none; }
  .switch-track {
    position: absolute; inset: 0;
    background: #1e1e26;
    border-radius: 12px;
    border: 1px solid #2a2a35;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s;
  }
  .switch-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #44435a;
    transition: transform 0.25s, background 0.25s;
    pointer-events: none;
  }
  .switch input:checked ~ .switch-track {
    background: #25F4EE22;
    border-color: #25F4EE66;
  }
  .switch input:checked ~ .switch-thumb {
    transform: translateX(20px);
    background: #25F4EE;
    box-shadow: 0 0 6px #25F4EE66;
  }

  /* Status strip */
  .status-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #1e1e26;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #44435a;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.on {
    background: #25F4EE;
    box-shadow: 0 0 5px #25F4EE88;
  }
  .status-text {
    font-size: 12px;
    color: #44435a;
    transition: color 0.3s;
  }
  .status-text.on { color: #25F4EE; }

  /* Guide */
  .guide-card {
    background: #15151a;
    border: 1px solid #1e1e26;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .guide-title {
    font-size: 11px;
    color: #55546a;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .guide-steps { display: flex; flex-direction: column; gap: 6px; }
  .guide-step {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; color: #7a7890;
  }
  .step-num {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #1e1e26;
    border: 1px solid #2a2a35;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    color: #55546a;
    flex-shrink: 0;
  }

  /* Footer */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }
  .btn-logout {
    font-size: 11px;
    color: #55546a;
    background: transparent;
    border: 1px solid #1e1e26;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { color: #e05a5a; border-color: #e05a5a44; }
  .ver-text { font-size: 10px; color: #2a2a35; }

  /* Loading */
  #loading-overlay {
    position: absolute; inset: 0;
    background: #0d0d0f;
    display: flex; align-items: center; justify-content: center;
    z-index: 99;
    flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid #1e1e26;
    border-top-color: #25F4EE;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: #44435a; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span class="loading-text">Memuat...</span>
</div>

<!-- Header (selalu tampil) -->
<div class="header">
  <div class="logo-dot"></div>
  <span class="logo-text">TikTok 60FPS</span>
  <span class="version-badge">v2.0 PRO</span>
</div>

<!-- PAGE: LOGIN -->
<div class="page" id="page-auth">
  <div class="auth-wrap">
    <div>
      <p class="auth-title">Selamat Datang</p>
      <p class="auth-sub">Login untuk menggunakan fitur 60FPS</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login-btn" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" id="tab-reg-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <!-- LOGIN FORM -->
    <div id="form-login" class="field-group">
      <div>
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="login-email" placeholder="email@kamu.com" autocomplete="email">
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Masuk</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" class="field-group" style="display:none">
      <div>
        <label class="field-label">Username</label>
        <input class="field-input" type="text" id="reg-username" placeholder="username kamu">
      </div>
      <div>
        <label class="field-label">Email</label>
        <input class="field-input" type="email" id="reg-email" placeholder="email@kamu.com">
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="field-input" type="password" id="reg-pass" placeholder="min. 6 karakter">
      </div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Buat Akun</button>
    </div>
  </div>
</div>

<!-- PAGE: MAIN -->
<div class="page" id="page-main">
  <div class="main-wrap">

    <!-- User Card -->
    <div class="user-card">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="user-name">–</div>
        <div class="user-email" id="user-email">–</div>
      </div>
      <div class="plan-badge" id="plan-badge">FREE</div>
    </div>

    <!-- Toggle Card -->
    <div class="toggle-card">
      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label-main">Mode 60FPS</div>
          <div class="toggle-label-sub">Aktifkan saat di halaman upload</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="fps-toggle">
          <div class="switch-track"></div>
          <div class="switch-thumb"></div>
        </label>
      </div>
      <div class="status-strip">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Nonaktif</span>
      </div>
    </div>

    <!-- Guide -->
    <div class="guide-card">
      <p class="guide-title">Cara Pakai</p>
      <div class="guide-steps">
        <div class="guide-step"><div class="step-num">1</div><span>Aktifkan toggle di atas</span></div>
        <div class="guide-step"><div class="step-num">2</div><span>Buka halaman upload TikTok</span></div>
        <div class="guide-step"><div class="step-num">3</div><span>Upload video seperti biasa — 60FPS otomatis aktif</span></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-row">
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
      <span class="ver-text">TikTok 60FPS Pro v2.0</span>
    </div>

  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
